[pytest]
markers =
    smoke:       pruebas críticas de verificación rápida
    regression:  suite completa de regresión
    negative:    casos negativos y manejo de errores
    unit:        pruebas unitarias sin dependencias externas

# ✅ --cov genera cobertura automática en cada ejecución
# ✅ --cov-report=term-missing muestra líneas no cubiertas en terminal
# ✅ --cov-report=html genera reporte visual en htmlcov/
# ✅ --cov-fail-under=90 falla el build si la cobertura baja de 90%
addopts =
    --tb=short
    -v
    --cov=Logica
    --cov-report=term-missing
    --cov-report=html:reports/coverage
    --cov-fail-under=90

testpaths = Tests